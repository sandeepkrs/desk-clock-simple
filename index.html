<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: white; color: black; font-family: "Helvetica", Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; width: 100%; overflow: hidden; }
        .container { width: 95%; max-width: 800px; display: flex; flex-direction: column; align-items: center; }
        
        #header-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            width: 100%; 
            margin-top: 15px; 
            padding-bottom: 12px; 
            border-bottom: 5px solid black; 
        }

        .time-box { 
            display: flex;
            flex-direction: column;
            align-items: center; 
            flex: 1.2;
        }
        .clock-wrapper { display: flex; align-items: baseline; }
        #clock { font-size: 5.8em; font-weight: 900; line-height: 0.9; margin: 0; letter-spacing: -2px; }
        #ampm { font-size: 1.6em; font-weight: bold; margin-left: 5px; text-transform: uppercase; }
        #full-date { font-size: 1.5em; font-weight: bold; margin-top: 5px; text-align: center; }

        #weather-box { 
            text-align: right; 
            flex: 1;
            font-family: "Georgia", "Times New Roman", serif;
            font-size: 1.7em; 
            font-weight: bold; 
            line-height: 1.2;
            text-transform: uppercase; 
        }
        
        /* Month Section Container */
        .month-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            width: 100%;
            margin: 20px 0 10px 0;
            position: relative;
        }

        #timezone-display {
            font-size: 0.6em;
            color: gray;
            position: absolute;
            left: 0;
            text-transform: uppercase;
            font-weight: bold;
        }

        #month-name { 
            font-size: 1.8em; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin: 0;
        }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        
        th { 
            border: 3px solid black;
            background-color: black; 
            color: white; 
            text-transform: uppercase; 
            font-size: 1.1em; 
            padding: 10px 0;
        }

        td { 
            border: 3px solid black; 
            text-align: center; 
            padding: 15px 0; 
            font-size: 1.6em; 
            font-weight: bold; 
            color: black; 
        }

        .sun-col { 
            background-color: #e8e8e8; 
        }

        .today { background-color: black !important; color: white !important; }
    </style>
</head>
<body>

    <div class="container">
        <div id="header-row">
            <div class="time-box">
                <div class="clock-wrapper">
                    <div id="clock">--:--</div>
                    <div id="ampm">--</div>
                </div>
                <div id="full-date">LOADING...</div>
            </div>

            <div id="weather-box">
                BENGALURU<br>--&deg;C  --
            </div>
        </div>

        <div class="month-container">
            <div id="timezone-display">--</div>
            <div id="month-name">MONTH</div>
        </div>

        <table id="calendar">
            <thead>
                <tr>
                    <th class="sun-col" style="color: black;">Sun</th>
                    <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                </tr>
            </thead>
            <tbody id="calendar-body"></tbody>
        </table>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const city = params.get('city') || 'Bengaluru';
        const timeZone = params.get('tz') || 'Asia/Kolkata';

        // Set timezone text immediately
        document.getElementById('timezone-display').textContent = timeZone;

        function updateWeather() {
            fetch(`https://wttr.in/${city}?format=j1`)
                .then(res => res.json())
                .then(data => {
                    const current = data.current_condition[0];
                    const temp = current.temp_C;
                    const desc = current.weatherDesc[0].value;
                    document.getElementById('weather-box').innerHTML = `${city.toUpperCase()}<br>${temp}&deg;C  ${desc}`;
                })
                .catch(() => { 
                    document.getElementById('weather-box').innerHTML = `${city.toUpperCase()}<br>OFFLINE`; 
                });
        }

        function updateDisplay() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-IN', { timeZone, hour: '2-digit', minute: '2-digit', hour12: true });
            const parts = timeStr.split(/\s/);
            document.getElementById('clock').textContent = parts[0];
            document.getElementById('ampm').textContent = parts[1];
            document.getElementById('full-date').textContent = now.toLocaleDateString('en-IN', { timeZone, weekday: 'long', month: 'long', day: 'numeric' });

            const istDate = new Intl.DateTimeFormat('en-IN', {timeZone, year: 'numeric', month: 'numeric', day: 'numeric'}).formatToParts(now);
            const currentYear = parseInt(istDate.find(p => p.type === 'year').value);
            const currentMonth = parseInt(istDate.find(p => p.type === 'month').value) - 1;
            const todayDate = parseInt(istDate.find(p => p.type === 'day').value);
            
            document.getElementById('month-name').textContent = now.toLocaleDateString('en-IN', { timeZone, month: 'long', year: 'numeric' });
            
            const firstDayStr = new Date(currentYear, currentMonth, 1).toLocaleString("en-US", {timeZone: timeZone});
            const firstDay = new Date(firstDayStr).getDay();
            
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const tableBody = document.getElementById('calendar-body');
            tableBody.innerHTML = ""; 

            let dateCount = 1;
            for (let i = 0; i < 6; i++) {
                let row = document.createElement("tr");
                let hasData = false;
                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement("td");
                    if (j === 0) cell.classList.add("sun-col");
                    if (i === 0 && j < firstDay) { cell.textContent = ""; }
                    else if (dateCount > daysInMonth) { cell.textContent = ""; }
                    else {
                        cell.textContent = dateCount;
                        if (dateCount === todayDate) cell.classList.add("today");
                        dateCount++;
                        hasData = true;
                    }
                    row.appendChild(cell);
                }
                if (hasData || i === 0) tableBody.appendChild(row);
            }
        }

        function startPrecisionClock() {
            updateDisplay();
            const now = new Date();
            const delay = 60000 - (now.getSeconds() * 1000 + now.getMilliseconds());
            setTimeout(() => {
                updateDisplay();
                setInterval(updateDisplay, 60000);
            }, delay);
        }

        startPrecisionClock();
        updateWeather();
        setInterval(updateWeather, 1800000); 
        setInterval(() => { location.reload(); }, 3600000);
    </script>
</body>
</html>
